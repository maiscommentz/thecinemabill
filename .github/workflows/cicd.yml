name: CI/CD

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: "[⚙️] Checkout repository"
        uses: actions/checkout@v5

      - name: "[🔧] Setup Node.js"
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: "[📦] Install dependencies"
        run: npm ci

      - name: "[🧹] Run ESLint"
        run: npm run lint

      - name: "[🧪] Run type check"
        run: npx tsc --noEmit

  build:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: "[⚙️] Checkout repository"
        uses: actions/checkout@v5

      - name: "[📦] Setup Node.js"
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: "[📦] Install dependencies"
        run: npm ci

      - name: "[🏗️] Build static website"
        run: npm run build

      - name: "[📁] Upload build artifacts"
        uses: actions/upload-artifact@v6
        with:
          name: build
          path: out

  deploy-develop:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: "[📁] Download build artifacts"
        uses: actions/download-artifact@v8
        with:
          name: build
          path: out

      - name: "[🚀] Deploy via SCP"
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "out/*"
          target: ${{ vars.SERVER_TARGET_DEVELOP }}
          strip_components: 1

      - name: "[🐋] Restart Docker container"
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ${{ vars.SERVER_TARGET_DEVELOP }}/..
            docker compose up -d

  deploy-production:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: "[📁] Download build artifacts"
        uses: actions/download-artifact@v8
        with:
          name: build
          path: out

      - name: "[🚀] Deploy via SCP"
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "out/*"
          target: ${{ vars.SERVER_TARGET_PRODUCTION }}
          strip_components: 1

      - name: "[🐋] Restart Docker container"
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ${{ vars.SERVER_TARGET_PRODUCTION }}/..
            docker compose up -d